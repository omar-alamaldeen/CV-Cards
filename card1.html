<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar Alamaldeen — Power & Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: rgba(201,168,76,0.12);
    --black: #080808;
    --card-bg: #121212;
    --text: #F0EDE8;
    --muted: rgba(240,237,232,0.45);
    --border: rgba(201,168,76,0.2);
  }
  html, body {
    min-height: 100vh;
    background: var(--black);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.7s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
  }
  .card::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.06);
  }

  .sector-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 100px;
    padding: 5px 12px;
    margin-bottom: 24px;
  }
  .sector-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .gold-bar {
    width: 32px; height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    margin-bottom: 14px;
    border-radius: 2px;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }

  .job-title {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 22px;
  }

  .contacts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    transition: color 0.2s;
  }
  .contact-row:hover { color: var(--gold); }
  .contact-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg {
    width: 13px; height: 13px;
    fill: var(--gold);
  }

  /* CV BUTTON */
  .cv-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 12px;
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, transform 0.15s;
  }
  .cv-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.1));
    border-color: var(--gold);
    transform: translateY(-1px);
  }
  .cv-btn:active { transform: translateY(0); }
  .cv-btn-left { display: flex; align-items: center; gap: 10px; }
  .cv-btn svg { width: 16px; height: 16px; fill: var(--gold); }
  .cv-btn-arrow {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .cv-btn-arrow svg { width: 11px; height: 11px; stroke: var(--gold); fill: none; }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: rgba(240,237,232,0.2);
    letter-spacing: 0.08em;
  }
</style>
</head>
